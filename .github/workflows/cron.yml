name: Bot-USDT
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install requests
      - run: python bot.py
      - name: Forzar Guardado
        run: |
          git config --global user.name 'Hexx-Bot'
          git config --global user.email 'bot@hexx.com'
          git add data.json
          git commit -m "Registro Hexx: $(date)" || exit 0
          git push origin main
