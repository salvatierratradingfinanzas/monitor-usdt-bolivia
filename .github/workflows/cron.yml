name: Bot-USDT
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install requests
      - run: python bot.py
      - name: Forzar Guardado Total
        run: |
                git config --global user.name 'Hexx-Bot'
                git config --global user.email 'bot@hexx.com'
                git add data.json  # Asegúrate de que el nombre coincide exactamente
                git commit -m "Registro Hexx: $(date +'%Y-%m-%d %H:%M:%S')" || echo "Nada nuevo para guardar"
                git push origin main
