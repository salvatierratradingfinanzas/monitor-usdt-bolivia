name: Bot-USDT
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install requests
      - run: python bot.py
      - run: |
          git config --global user.name 'Hexx-Bot'
          git config --global user.email 'bot@hexx.com'
          git add data.json
          git commit -m "update" || exit 0
          git push
